<div class="modal-overlay" *ngIf="visible" (click)="onClose()">
  <div class="modal-content" [class.modal-small]="size === 'small'" [class.modal-medium]="size === 'medium'" [class.modal-large]="size === 'large'" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>{{ title }}</h3>
      <button class="close-btn" (click)="onClose()">&times;</button>
    </div>
    <div class="modal-body">
      <ng-content></ng-content>
    </div>
  </div>
</div>
