<div class="solicitudes-page">
  <div class="header">
    <h2>Solicitudes de Servicio</h2>
    <button class="btn btn-secondary" (click)="cargarSolicitudes()" [disabled]="isLoading">
      <i class="fa-solid fa-rotate-right"></i> Actualizar
    </button>
  </div>

  <div *ngIf="isLoading" class="loading-container">
    <app-loading-spinner></app-loading-spinner>
  </div>

  <div *ngIf="!isLoading && solicitudes.length === 0" class="empty-state">
    <i class="fa-solid fa-inbox fa-3x"></i>
    <p>No hay solicitudes de servicio recientes</p>
  </div>

  <div *ngIf="!isLoading && solicitudes.length > 0" class="solicitudes-list">
    <div class="solicitud-card" *ngFor="let s of solicitudes">
      <div class="card-header">
        <span class="estado-badge" [ngClass]="s.estado">{{ s.estado | uppercase }}</span>
        <span class="fecha">{{ s.fecha | date:'short' }}</span>
      </div>
      <div class="card-body">
        <p><strong>Sugerido por:</strong> {{ s.sugerido_por }}</p>
        <p *ngIf="s.distancia_km !== undefined"><strong>Distancia:</strong> {{ s.distancia_km | number:'1.1-2' }} km</p>
        <p *ngIf="s.comentario"><strong>Comentario:</strong> {{ s.comentario }}</p>
      </div>
      <div class="card-actions" *ngIf="s.estado === 'pendiente' || s.estado === 'sugerido'">
        <button class="btn btn-success" (click)="aceptarSolicitud(s.id)">Aceptar</button>
        <button class="btn btn-danger" (click)="rechazarSolicitud(s.id)">Rechazar</button>
      </div>
    </div>
  </div>

  <app-modal
    title="Asignar Técnicos y Vehículos"
    [visible]="showAceptarModal"
    (close)="cerrarModal()">
    
    <div class="form-group mb-3">
      <label>Técnico *</label>
      <select class="form-control" [(ngModel)]="selectedTecnicoId">
        <option [ngValue]="null">Selecciona un técnico...</option>
        <option *ngFor="let t of tecnicosDisponibles" [value]="t.id">
          {{ t.nombre_completo }} ({{ t.especialidades.join(', ') || 'Sin especialidad' }})
        </option>
      </select>
      <small *ngIf="tecnicosDisponibles.length === 0" class="text-danger">No hay técnicos disponibles en este momento.</small>
    </div>

    <div class="form-group mb-4">
      <label>Vehículo (Opcional)</label>
      <select class="form-control" [(ngModel)]="selectedVehiculoId">
        <option [ngValue]="null">Ninguno</option>
        <option *ngFor="let v of vehiculosDisponibles" [value]="v.id">
          {{ v.marca }} {{ v.modelo }} - {{ v.matricula }}
        </option>
      </select>
    </div>

    <div class="d-flex justify-content-end gap-2 mt-4">
      <button class="btn btn-secondary" (click)="cerrarModal()">Cancelar</button>
      <button class="btn btn-success" (click)="confirmarAceptar()" [disabled]="!selectedTecnicoId || isSubmitting">
        <span *ngIf="!isSubmitting">Confirmar y Asignar</span>
        <span *ngIf="isSubmitting"><i class="fa-solid fa-spinner fa-spin"></i> Asignando...</span>
      </button>
    </div>
  </app-modal>
</div>
