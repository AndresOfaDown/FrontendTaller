<div class="change-password">
  <div class="step" *ngIf="!otpSent">
    <h3>Solicitar código</h3>
    <p>Se enviará un código de verificación a tu correo: <strong>{{ email }}</strong></p>
    <app-button variant="primary" (click)="sendOtp()" [loading]="isLoading">Enviar código</app-button>
  </div>
  <div class="step" *ngIf="otpSent">
    <h3>Ingresa el código y nueva contraseña</h3>
    <app-input-field
      label="Código de verificación"
      type="text"
      icon="fa-key"
      placeholder="123456"
      [required]="true"
      [(ngModel)]="code"
    ></app-input-field>
    <app-input-field
      label="Nueva contraseña"
      type="password"
      icon="fa-lock"
      placeholder="••••••••"
      [required]="true"
      [(ngModel)]="newPassword"
    ></app-input-field>
    <app-input-field
      label="Confirmar contraseña"
      type="password"
      icon="fa-lock"
      placeholder="••••••••"
      [required]="true"
      [(ngModel)]="confirmPassword"
    ></app-input-field>
    <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>
    <app-button variant="primary" (click)="onSubmit()" [loading]="isLoading">Cambiar contraseña</app-button>
  </div>
</div>
